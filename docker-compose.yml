services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_BASE_IMAGE: ${NODE_BASE_IMAGE:-node:22-alpine}
    restart: unless-stopped
    depends_on:
      - wisp
    env_file:
      - .env
    environment:
      PORT: 3001
      HOST: 0.0.0.0
      WISP_WS_URL: ws://wisp:4000
    ports:
      - "${PUBLIC_PORT:-3001}:3001"
    networks:
      - proxy-net

  wisp:
    build:
      context: .
      dockerfile: wisp/Dockerfile
      args:
        PYTHON_BASE_IMAGE: ${PYTHON_BASE_IMAGE:-python:3.12-slim}
    restart: unless-stopped
    ports:
      - "${WISP_PUBLIC_PORT:-4000}:4000"
    networks:
      - proxy-net

networks:
  proxy-net:
    driver: bridge
