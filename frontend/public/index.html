<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sigmund Unblocker</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="browser-shell">
    <section class="viewport">
      <iframe id="proxyFrame" title="Proxy viewport" sandbox="allow-scripts allow-forms allow-popups allow-downloads"></iframe>
    </section>

    <header id="controlBar" class="control-bar glass">
      <div class="bar-left">
        <select id="engineSelect" aria-label="Search engine"></select>
        <div class="app-shortcuts" id="appShortcuts"></div>
      </div>
      <div class="bar-center">
        <input id="urlInput" placeholder="Type a URL or search query..." autocomplete="off" />
      </div>
      <div class="bar-right">
        <button id="goBtn" class="primary">Go</button>
        <button id="newTabBtn" title="Open a fresh tab">New</button>
        <button id="hideBarBtn" title="Hide controls">Hide</button>
      </div>
    </header>

    <button id="floatingToggle" class="floating-toggle" aria-label="Show controls" hidden>☰</button>

    <section id="statusDock" class="status-dock glass">
      <div class="status-header">
        <span>Status</span>
        <button id="toggleStatusBtn">–</button>
      </div>
      <div id="statusBody" class="status-body">
        <div id="metrics" class="metrics"></div>
        <div id="errorPanel" class="panel"></div>
        <pre id="logs"></pre>
      </div>
    </section>
  </main>

  <script src="/app.js" defer></script>
</body>
</html>
