<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sigmund Unblocker</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar glass">
      <h1>Sigmund</h1>
      <p class="muted">Responsible proxy platform</p>
      <section>
        <h2>Controls</h2>
        <label><input id="toggleCache" type="checkbox" checked /> Cache</label>
        <label>Timeout <input id="timeoutMs" type="number" value="20000" /></label>
        <label>Header Mod JSON <textarea id="headersJson">{"x-forwarded-for":"sigmund"}</textarea></label>
      </section>
      <section>
        <h2>Metrics</h2>
        <div id="metrics"></div>
      </section>
      <section>
        <h2>Errors</h2>
        <div id="errorPanel" class="panel"></div>
      </section>
      <p class="disclaimer">Use only for lawful and authorized access. Misuse is prohibited.</p>
    </aside>

    <main class="main">
      <header class="floating glass">
        <div class="tabs" id="tabs"></div>
        <div class="urlbar">
          <input id="urlInput" placeholder="Enter URL (https://example.com)" />
          <button id="goBtn">Go</button>
          <button id="newTabBtn">+ Tab</button>
        </div>
      </header>

      <section class="content glass">
        <iframe id="proxyFrame" sandbox="allow-scripts allow-forms allow-same-origin allow-popups"></iframe>
      </section>

      <section class="logs glass">
        <h3>Real-time Request Logs</h3>
        <pre id="logs"></pre>
      </section>
    </main>
  </div>
  <script src="/app.js" defer></script>
</body>
</html>
